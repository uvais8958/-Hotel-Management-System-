<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management Sysytem</title>
    <!-- start css link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/Bootstrap.css">
<link rel="stylesheet" href="css/animate.css">
<link rel="stylesheet" href="css/fontawasome.css">
<!-- end css link -->
<!-- strat js link -->
 <script src="js/bootstrap.js"></script>
 <script src="js/sweetalert.js"></script>
 <!-- end js link -->
</head>
<body>



<!-- //Navbar section -->
<nav class="navbar navbar-expand-md fixed-top navbar-light">
    <div class="container-fluid">
        <img src="logo.jpg" class="rounded-circle"width="60" alt="">
        <a href="#" class=" mx-4 navbar-brand text-white">
            H M S</a>
        <button class="navbar-toggler" data-bs-toggle="collapse" 
        data-bs-target="#myMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="navbar-collapse collapse" id="myMenu">
            <ul class="navbar-nav w-100 justify-content-end">
            <li class="nav-item text-white fw-bold">
                Uvais Ansari
            </li>
        </ul>
        </div>
    </div>
</nav>



<br><br>
<div class="container mt-5">
    <div class="row">
        <div class="col-md-6">
            <!-- nav tab -->
             <ul class="nav nav-tabs">
                <li class="nav-item">
                    <a href="#signup" class="nav-link " data-bs-toggle="tab">
                        Signup
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#login" class="nav-link active" data-bs-toggle="tab">
                        Login
                    </a>
                </li>
             </ul>


             <!-- nav pane -->
              <div class="tab-content">
                <div class="tab-pane container  mt-3" id="signup">
                    <img src="signup.jpg" class="w-25" alt="">
                  
                  <!-- User Form Submited -->
                    <form class="reg-form">
  
  <input required name="Fullname" type="text" placeholder=
   "Fullname" class=" mb-3 form-control">
  
   <input required name="hotelName" type="text" placeholder=
    "Hotel Name" class="mb-3 form-control">
  
    <input required  name="totalRooms"type="number" placeholder=
      "No of Hotel Room" class="mb-3 form-control">
      
      <input required name="mobile" type="number" placeholder=
         "Mobile_no" class=" mb-3 form-control">
      
         <input required  name="email" type="email" placeholder=
             "Email" class=" mb-3 form-control">
      
             <input  required name="password"type="password"
                  placeholder="password" class="form-control">
          
                 <button type="submit"  class=" btn btn-primary 
                  w-100">Register</button>
                    </form>
                </div>


                 <div class="tab-pane active  container mt-3" id="login">
                    <img src="login.png" class="w-25" alt="">
                    

                    <!-- Login form -->
                    <form class="login-form">
                                    <input type="email" 
                                    placeholder="Email" class=" mb-3 form-control">
                                       <input type="password" placeholder=
                                       "password" class="form-control">
                                       <button type="submit" class=" 
                                       btn btn-primary w-100">Login</button>
                    </form>
                </div>
              </div>
        </div>
        <div class=" d-flex justify-content-center align-items-center col-md-6 mt-5">
            <img src="hotel.jpg" class="w-100" alt="">
        </div>
    </div>
</div>






 <script src="js/app.js"></script>
 <!-- end js link -->
 </script>
</body>
</html>
